name: Java CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true
      - name: Build
        run: |
          ./gradlew clean build -x test
